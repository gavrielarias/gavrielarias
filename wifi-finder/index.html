<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Finder Costa Rica</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6C63FF;
            --secondary: #FF6584;
            --success: #00D9A5;
            --warning: #FFB946;
            --dark: #1A1A2E;
            --light: #F8F9FA;
            --card-bg: #FFFFFF;
            --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            --shadow-hover: 0 12px 32px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: var(--dark);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease;
        }

        .header h1 {
            font-family: 'Space Mono', monospace;
            font-size: 3.5rem;
            color: white;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            margin-bottom: 10px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.1rem;
        }

        .search-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .search-bar {
            position: relative;
            margin-bottom: 20px;
        }

        .search-bar input {
            width: 100%;
            padding: 18px 24px 18px 56px;
            border: 2px solid #E0E0E0;
            border-radius: 16px;
            font-size: 1.1rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
        }

        .search-bar input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.2rem;
        }

        .filter-section {
            margin-bottom: 16px;
        }

        .filter-label {
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            display: block;
            font-size: 0.9rem;
        }

        .filters {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #E0E0E0;
            background: white;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .top-speeds {
            margin-bottom: 40px;
        }

        .section-title {
            color: white;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 20px;
            animation: fadeInLeft 0.6s ease 0.3s both;
        }

        .speed-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .speed-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--shadow);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            animation: fadeInUp 0.6s ease both;
            position: relative;
            overflow: hidden;
        }

        .speed-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .speed-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .speed-card:nth-child(1) { animation-delay: 0.4s; }
        .speed-card:nth-child(2) { animation-delay: 0.5s; }
        .speed-card:nth-child(3) { animation-delay: 0.6s; }
        .speed-card:nth-child(4) { animation-delay: 0.7s; }
        .speed-card:nth-child(5) { animation-delay: 0.8s; }
        .speed-card:nth-child(6) { animation-delay: 0.9s; }

        .speed-rank {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .location-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 8px;
            padding-right: 50px;
        }

        .location-area {
            color: #666;
            font-size: 0.95rem;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .province-badge {
            display: inline-block;
            padding: 2px 8px;
            background: #f0f0f0;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            color: #666;
            margin-left: 6px;
        }

        .speed-display {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 12px;
        }

        .speed-value {
            font-family: 'Space Mono', monospace;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .speed-unit {
            font-weight: 600;
            color: #999;
        }

        .speed-details {
            display: flex;
            gap: 20px;
            padding-top: 16px;
            border-top: 1px solid #E0E0E0;
        }

        .speed-metric {
            flex: 1;
        }

        .speed-metric-label {
            font-size: 0.8rem;
            color: #999;
            margin-bottom: 4px;
        }

        .speed-metric-value {
            font-weight: 600;
            color: var(--dark);
        }

        .map-container {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            animation: fadeInUp 0.6s ease 1s both;
        }

        .map-wrapper {
            position: relative;
            height: 700px;
            background: #C8E6C9;
            border-radius: 16px;
            overflow: hidden;
        }

        #costaRicaSvg {
            width: 100%;
            height: 100%;
        }

        .map-pin {
            position: absolute;
            width: 30px;
            height: 30px;
            background: var(--primary);
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(108, 99, 255, 0.4);
            z-index: 100;
        }

        .map-pin::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .map-pin:hover {
            transform: rotate(-45deg) scale(1.3);
            z-index: 1000;
        }

        .map-label {
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            background: rgba(0, 0, 0, 0.85);
            color: white;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            font-weight: 500;
        }

        .map-pin:hover .map-label {
            opacity: 1;
        }

        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .no-results h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }

            .speed-grid {
                grid-template-columns: 1fr;
            }

            .map-wrapper {
                height: 500px;
            }

            .filters {
                gap: 8px;
            }

            .filter-btn {
                font-size: 0.85rem;
                padding: 8px 14px;
            }
        }
    </style>
</head>

            // Apply search filter
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                data = data.filter(location => 
                    location.name.toLowerCase().includes(term) ||
                    location.area.toLowerCase().includes(term) ||
                    location.province.toLowerCase().includes(term) ||
                    location.speed.toString().includes(term)
                );
            }
            
            // Apply province filter
            if (provinceFilter !== 'all') {
                data = data.filter(location => location.province === provinceFilter);
            }
            
            // Apply speed filter
            if (speedFilter === 'ultra') {
                data = data.filter(location => location.speed >= 200);
            } else if (speedFilter === 'fast') {
                data = data.filter(location => location.speed >= 100 && location.speed < 200);
            } else if (speedFilter === 'medium') {
                data = data.filter(location => location.speed >= 50 && location.speed < 100);
            } else if (speedFilter === 'slow') {
                data = data.filter(location => location.speed < 50);
            }
            
            filteredData = data;
            renderSpeedCards(filteredData);
            renderMap();
        }

        function highlightLocation(name) {
            const cards = document.querySelectorAll('.speed-card');
            cards.forEach(card => {
                if (card.querySelector('.location-name').textContent === name) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    card.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        card.style.transform = '';
                    }, 500);
                }
            });
        }

        function showLocationCard(name) {
            highlightLocation(name);
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', (e) => {
            filterData(e.target.value, currentProvinceFilter, currentSpeedFilter);
        });

        document.querySelectorAll('#provinceFilters .filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#provinceFilters .filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentProvinceFilter = e.target.dataset.province;
                const searchTerm = document.getElementById('searchInput').value;
                filterData(searchTerm, currentProvinceFilter, currentSpeedFilter);
            });
        });

        document.querySelectorAll('#speedFilters .filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#speedFilters .filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentSpeedFilter = e.target.dataset.speed;
                const searchTerm = document.getElementById('searchInput').value;
                filterData(searchTerm, currentProvinceFilter, currentSpeedFilter);
            });
        });

        // Initial render
        renderSpeedCards(wifiData);
        renderMap();
    </script>
</body>
</html>
